# Supabase CLI configuration. Tracked in source control so the migration
# workflow is reproducible from this repository (per CLAUDE.md).
#
# The remote project is linked separately with `supabase link --project-ref
# <ref>` — the project ref is treated as a credential and is not stored here.
# A local stack started with `supabase start` is for development convenience
# only; production runs against the linked EU project.

project_id = "entertain"

[db]
# Postgres major version on the remote Supabase project (EU). Keep aligned
# with whatever the dashboard reports for the linked project.
major_version = 17

# Spec 019 — the stock-photos proxy (Pexels) + quota enforcement. verify_jwt is
# on (the default), so only authenticated sessions — including the app's
# anonymous ones — may call it; the function then identifies the caller from the
# JWT. PEXELS_API_KEY is a Supabase secret, set out of band by the operator.
[functions.stock-photos]
verify_jwt = true

# Spec 020 — the AI dish assistant (Anthropic API). verify_jwt is on, so only
# authenticated sessions (incl. anonymous) may call it; the function identifies
# the caller from the JWT. ANTHROPIC_API_KEY is a Supabase secret set out of band
# by the operator; it reuses PEXELS_API_KEY for the photo fallback.
[functions.dish-assistant]
verify_jwt = true

# Spec 029 — the PUBLIC RSVP page (guests Layer 2). verify_jwt is OFF: invited
# guests open the link logged-out, with no Supabase key. Auth is the unguessable
# per-guest token in the URL; the function reads/writes ONLY that token's row via
# the service-role client (event_guests has the SELECT+UPDATE grant).
[functions.rsvp]
verify_jwt = false
