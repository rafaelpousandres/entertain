name: entertain
description: "Entertain — organize domestic events: menus, dishes, ingredients, supplier shopping lists."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.11+12

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  intl: ^0.20.2
  share_plus: ^12.0.0
  supabase_flutter: ^2.12.4
  # Runtime dependency (not just a generator): main.dart calls
  # FlutterNativeSplash.preserve()/remove() to hold the native splash until the
  # in-app overlay logo is precached, so the cream→logo handover has no blank
  # frame. Also generates the native launch screen (`dart run
  # flutter_native_splash:create`).
  flutter_native_splash: ^2.4.3
  url_launcher: ^6.3.1

  # Spec 009 §2.2 — photos: camera/gallery capture, native-backed JPEG
  # compression (resize + quality), full-screen pinch-to-zoom viewer.
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  photo_view: ^0.15.0
  # Spec 009 §2.3 — contact picker (Android READ_CONTACTS).
  flutter_contacts: ^1.1.9
  # Spec 009 §2.2/§2.3 — runtime permissions; its openAppSettings() also
  # provides the deep link to the app's system settings page for the
  # "denied permanently" recovery path.
  permission_handler: ^11.3.1
  # Spec 009 §2.2 — client-side ids for event-photo object names
  # (`{event_id}/{photo_id}.jpg`).
  uuid: ^4.5.1
  intl_phone_field: ^3.2.0
  # Spec 011 §2.7 — local, per-device persistence of each event's last active tab.
  shared_preferences: ^2.3.2
  # Spec 012 §2.1 — read the app version at runtime so the Settings card shows
  # the real pubspec version instead of a hand-maintained literal.
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
  generate: true

  # Spec 012 §2.1 — the brand icon is loaded at runtime for the in-app logo
  # (Settings card + header). The launcher-icon/splash tooling reads the same
  # files directly, but `Image.asset` needs them bundled.
  assets:
    - assets/icon/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Regular.ttf
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-Regular.ttf
        - asset: assets/fonts/NunitoSans-Medium.ttf
          weight: 500
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  remove_alpha_ios: true
  image_path: "assets/icon/entertain - icon legacy.png"
  adaptive_icon_background: "assets/icon/entertain - icon background.png"
  adaptive_icon_foreground: "assets/icon/entertain - icon foreground.png"
  min_sdk_android: 21

# Spec 017 §A.2 / polish — the native splash is a PLAIN cream background, no
# logo. The Android 12+ circle mask was clipping the artwork and there was a
# size jump to the in-app overlay; removing the native logo fixes both. The
# brand logo now appears only via the in-app overlay (lib/app.dart,
# _SplashOverlay), on the same #FBF5EA background, so the handover shows only
# the logo appearing with no colour jump.
#
# NOTE: on Android 12+ the system splash always renders an icon — if none is
# given it falls back to the launcher icon, which is exactly the native "logo"
# we want gone. So we force a fully transparent icon (assets/native_splash/
# transparent.png) to get a genuinely plain cream splash on 12+; without it the
# launcher icon reappears and the double-logo flash returns.
# Regenerate native assets with `dart run flutter_native_splash:create` after
# changing this block.
flutter_native_splash:
  color: "#FBF5EA"
  android_12:
    color: "#FBF5EA"
    image: assets/native_splash/transparent.png
    icon_background_color: "#FBF5EA"
